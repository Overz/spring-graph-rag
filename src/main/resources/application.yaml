server:
  address: "${APP_HOST:0.0.0.0}"
  port: "${APP_PORT:8090}"
  shutdown: graceful
  tomcat:
    # Sem isso, upload muito acima do limite multipart faz o Tomcat abortar a conexão
    # antes de o cliente ler a resposta — e o 413 de domínio (FILE_TOO_LARGE) nunca
    # chega. -1 = engolir o corpo restante e responder (docs/sdd/ingestao.md §2).
    max-swallow-size: -1

spring:
  application:
    name: @project.artifactId@
  security:
    oauth2:
      resourceserver:
        jwt:
          # Realm graphrag do Keycloak local (ADL-008) — validação por JWKS
          issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/graphrag}"
  servlet:
    multipart:
      # Um pouco acima do limite de negócio de 5MB (RF03) para que a validação de
      # domínio (413 + code estável) responda antes da exceção genérica do container
      # (docs/sdd/ingestao.md §2).
      max-file-size: 6MB
      max-request-size: 6MB
  ai:
    vectorstore:
      opensearch:
        # Obrigatório para o OpenSearchClient da autoconfiguração; a conexão em si é
        # preguiçosa — o índice de chunks só passa a existir/ser usado no Épico 5.
        uris: "${OPENSEARCH_URIS:http://localhost:9200}"
#    ollama:
#      base-url: "${OLLAMA_BASE_URL:http://localhost:11434}"
#      init:
#        pull-model-strategy: when_missing
#      # Embeddings via Ollama (ver ADR-003) — modelo dedicado a retrieval, melhor
#      # qualidade que um sentence-transformer genérico. MAX_LOADED_MODELS=2 no
#      # compose.yaml mantém este modelo residente junto com o de chat, sem thrashing.
#      embedding:
#        options:
#          model: nomic-embed-text

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  # Métricas em formato Prometheus ficam expostas em /actuator/prometheus para o OTel
  # Collector coletar via scrape (ver otelcol-config.yaml). Traces e logs vão via push OTLP.
  otlp:
    metrics:
      export:
        url: "${OTEL_COLLECTOR_URL:http://localhost:4318}/v1/metrics"
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: "${OTEL_COLLECTOR_URL:http://localhost:4318}/v1/traces"
    logging:
      export:
        otlp:
          endpoint: "${OTEL_COLLECTOR_URL:http://localhost:4318}/v1/logs"

app:
  storage:
    # Diretório-base do adaptador POSIX do DocumentStorage (ADR-001): aponta pro mount
    # JuiceFS (ver compose.yaml); num filesystem comum funciona igual. Os estágios
    # (raw/extracted/transformed) são subdiretórios por chave — ver StorageLocation.
    base-dir: "${APP_STORAGE_BASE_DIR:@project.basedir@/tmp/blobstore}"
  upload:
    # Parâmetros de negócio da cadeia de validação (RF02/RF03/RF04) — UploadProperties.
    # Invariantes de formato (assinaturas mágicas, string EICAR) continuam hardcoded
    # nos próprios validadores; só regra de negócio vive aqui.
    max-file-size-bytes: 5242880
    max-filename-length: 255
    accepted-types:
      pdf: application/pdf
      jpg: image/jpeg
      jpeg: image/jpeg
      png: image/png
      csv: text/csv,text/plain
      json: application/json,text/plain
      xml: application/xml,text/xml
      txt: text/plain
      md: text/markdown,text/x-web-markdown,text/plain
