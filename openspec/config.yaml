schema: spec-driven

context: |
  Plataforma GraphRAG local (RAG + knowledge graph), monólito modular:
  Java 25, Spring Boot 4.1.0, Spring AI 2.0, Spring Modulith, Maven single-module.
  Módulos: api / rag / chat (placeholder) / mcp / shared — pipeline de ingestão
  100% event-driven; api→rag e mcp→rag são as únicas dependências diretas.
  Infra 100% local e gratuita via compose.yaml (Postgres, Neo4j, OpenSearch,
  MinIO+JuiceFS+Redis, Ollama, Docling, LGTM; Keycloak/ClamAV/NATS/GLiNER por épico).

  Hierarquia de documentação (openspec/ é a fonte única da verdade desde
  22/jul/2026 — migração de docs/requisitos.md, docs/rag-plan.md e docs/adr/,
  que não existem mais):
  - openspec/requirements/RF-NN.md + RNF-NN.md — O QUÊ: um arquivo por
    requisito (RF-01–RF-40, RNF-01–04); fonte principal, nenhum escopo existe
    fora deles. Sub-variantes (revisão/complemento) ficam dentro do arquivo do
    RF pai, não são arquivo próprio.
  - src/test/resources/features/ — QUANDO PRONTO: features Gherkin pt-BR
    derivadas dos RFs, tags @RFxx; runner filtra `not @pendente`.
  - docs/sdd.md + docs/sdd/ — COMO: o design mais recente (não migrado — não é
    requisito nem plano nem decisão pontual, é referência viva de arquitetura).
  - openspec/decisions/ADR-NNN.md — POR QUÊ: decisões pontuais duráveis e
    cross-cutting. Decisões escopadas a um único change continuam no próprio
    `design.md` desse change, não viram ADR global.
  - openspec/plans/PLAN-NN.md — só ORDEM dos épicos/tarefas [N.M], um arquivo
    por épico (PLAN-00–PLAN-10, número = número do épico); doc mais antigo em
    espírito, detalhes técnicos nele podem estar desatualizados — conferir no
    SDD/repositório. `openspec/plans/README.md` guarda roadmap/riscos/referências
    transversais que não pertencem a um épico específico.
  - openspec/technical-debt/TD-NNN.md — débito técnico aberto (mock em vez de
    integração real, decisão de escopo aceita, risco não mitigado): origem,
    mitigação atual, resolução planejada.

  Papel do OpenSpec neste projeto: fonte única da verdade E camada de EXECUÇÃO
  do backlog — mesmo sistema, sem duplicação entre "documentação" e "backlog".
  - Um change por épico (ou por iniciativa ad-hoc fora da numeração de épico,
    ex.: auth-phantom-token, listagem-de-documentos).
  - openspec/specs/ cresce só via archive e registra o que está de fato
    implementado (não muda de papel com esta migração — specs continuam
    nomeadas por capability, não por número).
  - Definition of Done imutável de qualquer tarefa que implementa RF: os cenários
    @RFxx correspondentes passam com a tag @pendente removida + ModularityTest verde.

  IMPORTANTE — requirements/, plans/, decisions/, technical-debt/ NÃO são
  artefatos do schema spec-driven (que só conhece proposal/specs/design/tasks):
  `openspec validate/list/archive/doctor` nunca tocam esses 4 diretórios. Rastreabilidade
  é disciplina de link, não tooling — todo spec.md e todo proposal/design/tasks
  novo cita o RF-NN.md/PLAN-NN.md/ADR-NNN.md/TD-NNN.md que usa, sempre de dentro
  (artefato gerenciado pela CLI) pra fora (artefato não-gerenciado), nunca o
  inverso. Sem checagem automática — verificação é sweep manual sob demanda.

  Convenções de código: records para dados; Lombok @RequiredArgsConstructor em
  serviços; var em locais; erros via ApplicationError/HttpApplicationError
  (ProblemDetail RFC 9457, `code` estável usado pelos BDDs); logging só pelo
  Logger/LoggerFactory do módulo shared. Idioma dos artefatos: pt-BR.

rules:
  proposal:
    - Referenciar o(s) PLAN-NN.md e as tarefas [N.M] que o change cobre
    - Não inventar escopo fora dos RFs; citar os RF-NN.md envolvidos
  specs:
    - Cada requirement cita os RF-NN.md e o arquivo .feature que o valida
    - Não reescrever os cenários Gherkin — resumir WHEN/THEN e apontar para a feature
  design:
    - Apontar para o documento docs/sdd/*.md correspondente em vez de copiá-lo;
      registrar aqui apenas decisões novas tomadas durante o change
    - Decisão nova que seja durável/cross-cutting (não só deste change) vira
      ADR em openspec/decisions/, não fica só no design.md
  tasks:
    - Espelhar a ordenação [N.M] do PLAN-NN.md correspondente, mas puxar todo
      detalhe técnico (schemas, DoDs, caminhos) do SDD e do repositório, nunca do plano
  technical-debt:
    - Todo débito aceito conscientemente durante um change (mock em vez de
      integração real, risco não mitigado, escopo cortado) vira TD-NNN.md,
      referenciado pelo proposal/design do change que o originou
