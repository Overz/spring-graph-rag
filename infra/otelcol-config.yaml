# Config do OTel Collector embutido no grafana/otel-lgtm — baseada na config padrão da
# imagem (grafana/docker-otel-lgtm, docker/otelcol-config.yaml), só com um scrape job extra
# no receiver "prometheus/collector" para coletar métricas do actuator da aplicação.
# Montada em /otel-lgtm/otelcol-config.yaml (ver compose.yaml).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: "opentelemetry-collector"
          scrape_interval: 1s
          static_configs:
            - targets: ["127.0.0.1:8888"]
        # App roda no host durante o desenvolvimento (fora do compose); host.docker.internal
        # alcança o processo local na porta do server (APP_PORT, default 8090 — não confundir
        # com a 3000 do Grafana). Expõe /actuator/prometheus via micrometer-registry-prometheus.
        - job_name: "spring-ai-rag"
          scrape_interval: 15s
          metrics_path: /actuator/prometheus
          static_configs:
            - targets: ["host.docker.internal:8090"]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/ready"

processors:
  batch:

exporters:
  otlp_http/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true
  otlp_http/traces:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true
  otlp_http/logs:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true
  otlp_grpc/profiles:
    endpoint: http://127.0.0.1:4040
    tls:
      insecure: true

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/traces]
    metrics:
      receivers: [otlp, prometheus/collector]
      processors: [batch]
      exporters: [otlp_http/metrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/logs]
    profiles:
      receivers: [otlp]
      exporters: [otlp_grpc/profiles]
